name: Firmware ROM Extractor (Optimized 7z)

on:
  workflow_dispatch:
    inputs:
      ARCHIVE_URL:
        description: "Firmware zip URL (raw link)"
        required: true
      OUTPUT_NAME:
        default: "rom"
        required: true
      SLOT:
        description: "Select slot to extract (A/B)"
        type: choice
        options:
          - "_a"
          - "_b"
        default: "_a"
        required: true
      INCLUDE_NON_SUPER:
        description: "Include non-super images (boot, dtbo, etc)"
        type: choice
        options:
          - "true"
          - "false"
        default: "false"
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      # 1. Install + Download
      - run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y \
            p7zip-full unzip git python3 python3-pip

          mkdir -p in extracted super_out final nonsuper out groups groups_ns

          curl -L --fail "${{ github.event.inputs.ARCHIVE_URL }}" -o in/fw.zip
          7z x in/fw.zip -oextracted

      # 2. Extract super.img
      - run: |
          set -e

          SUPER=$(find extracted -type f -name "super*.img*" | head -n1)
          [ -n "$SUPER" ] || exit 1

          git clone https://github.com/unix3dgforce/lpunpack.git
          pip3 install protobuf

          python3 lpunpack/lpunpack.py "$SUPER" super_out

      # 3. Filter super partitions
      - run: |
          set -e
          SLOT="${{ github.event.inputs.SLOT }}"

          find super_out -maxdepth 1 -name "*.img" | while read -r f; do
            name=$(basename "$f")

            case "$name" in
              system${SLOT}.img|vendor${SLOT}.img|product${SLOT}.img|system_ext${SLOT}.img|odm${SLOT}.img|\
              system_dlkm${SLOT}.img|vendor_dlkm${SLOT}.img|odm_dlkm${SLOT}.img|\
              vbmeta_system${SLOT}.img|vbmeta_vendor${SLOT}.img)
                clean=$(echo "$name" | sed "s/${SLOT}//")
                cp "$f" "final/$clean"
                ;;
            esac
          done

          [ "$(ls final/*.img 2>/dev/null | wc -l)" -gt 0 ] || exit 1

      # 4. Optional non-super extraction
      - run: |
          set -e

          if [ "${{ github.event.inputs.INCLUDE_NON_SUPER }}" = "true" ]; then
            find extracted -type f -name "*.img" | while read -r f; do
              name=$(basename "$f")

              case "$name" in
                super*.img*) continue ;;
                system*.img|vendor*.img|product*.img|system_ext*.img|odm*.img|\
                system_dlkm*.img|vendor_dlkm*.img|odm_dlkm*.img|\
                vbmeta_system*.img|vbmeta_vendor*.img)
                  continue
                  ;;
              esac

              cp "$f" "nonsuper/$name" 2>/dev/null || true
            done
          fi

      # 5. Group function
      - run: |
          set -e

          group_dir () {
            SRC=$1
            DST=$2

            LIMIT=$((4 * 1024 * 1024 * 1024))

            declare -a sizes
            declare -a dirs
            group_count=0

            for f in $(ls -S $SRC/*.img 2>/dev/null || true); do
              fsize=$(stat -c%s "$f")
              placed=0

              for i in "${!sizes[@]}"; do
                if [ $((sizes[i] + fsize)) -le $LIMIT ]; then
                  cp "$f" "${dirs[i]}/"
                  sizes[i]=$((sizes[i] + fsize))
                  placed=1
                  break
                fi
              done

              if [ "$placed" -eq 0 ]; then
                dir="$DST/part$group_count"
                mkdir -p "$dir"

                cp "$f" "$dir"

                sizes[$group_count]=$fsize
                dirs[$group_count]=$dir
                group_count=$((group_count + 1))
              fi
            done
          }

          group_dir final groups

          if [ "${{ github.event.inputs.INCLUDE_NON_SUPER }}" = "true" ]; then
            group_dir nonsuper groups_ns
          fi

      # 6. Compress
      - run: |
          set -e

          for dir in groups/part*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            7z a -mx=7 -ms=on -m0=lzma2:d=256m -v1900m \
              "out/${{ github.event.inputs.OUTPUT_NAME }}-$name.7z" "$dir"/*
          done

          if [ "${{ github.event.inputs.INCLUDE_NON_SUPER }}" = "true" ]; then
            for dir in groups_ns/part*; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")

              7z a -mx=7 -ms=on -m0=lzma2:d=256m -v1900m \
                "out/${{ github.event.inputs.OUTPUT_NAME }}-nonsuper-$name.7z" "$dir"/*
            done
          fi

      # 7. Release
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}
          name: rom-${{ github.run_id }}
          files: |
            out/${{ github.event.inputs.OUTPUT_NAME }}-part*.7z*
            out/${{ github.event.inputs.OUTPUT_NAME }}-nonsuper-part*.7z*
