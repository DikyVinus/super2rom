name: Firmware ROM Extractor (Optimized 7z)

on:
  workflow_dispatch:
    inputs:
      ARCHIVE_URL:
        description: "Firmware zip URL (raw link)"
        required: true
      OUTPUT_NAME:
        default: "rom"
        required: true
      SLOT:
        description: "Select slot to extract (A/B)"
        type: choice
        options:
          - "_a"
          - "_b"
        default: "_a"
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      # 1. Install + Download
      - run: |
          set -e

          sudo apt-get update -y
          sudo apt-get install -y \
            p7zip-full unzip git python3 python3-pip

          mkdir -p in extracted super_out final out groups

          curl -L --fail "${{ github.event.inputs.ARCHIVE_URL }}" -o in/fw.zip
          7z x in/fw.zip -oextracted

      # 2. Extract super.img
      - run: |
          set -e

          SUPER=$(find extracted -type f -name "super*.img*" | head -n1)
          [ -n "$SUPER" ] || exit 1

          git clone https://github.com/unix3dgforce/lpunpack.git
          pip3 install protobuf

          python3 lpunpack/lpunpack.py "$SUPER" super_out

      # 3. Filter partitions
      - run: |
          set -e

          SLOT="${{ github.event.inputs.SLOT }}"

          find super_out -maxdepth 1 -name "*.img" | while read f; do
            name=$(basename "$f")

            case "$name" in
              system${SLOT}.img|vendor${SLOT}.img|product${SLOT}.img|system_ext${SLOT}.img|odm${SLOT}.img|\
              system_dlkm${SLOT}.img|vendor_dlkm${SLOT}.img|odm_dlkm${SLOT}.img|\
              vbmeta_system${SLOT}.img|vbmeta_vendor${SLOT}.img)
                clean=$(echo "$name" | sed "s/${SLOT}//")
                cp "$f" "final/$clean"
                ;;
            esac
          done

          COUNT=$(ls final/*.img 2>/dev/null | wc -l)
          [ "$COUNT" -gt 0 ] || exit 1

      # 4. Dynamic grouping (~3GB target)
      - run: |
          set -e

          LIMIT=$((3 * 1024 * 1024 * 1024)) # ~3GB raw target

          declare -a sizes
          declare -a dirs

          group_count=0

          for f in $(ls -S final/*.img); do
            fsize=$(stat -c%s "$f")
            placed=0

            for i in "${!sizes[@]}"; do
              if [ $((sizes[i] + fsize)) -le $LIMIT ]; then
                cp "$f" "${dirs[i]}/"
                sizes[i]=$((sizes[i] + fsize))
                placed=1
                break
              fi
            done

            if [ "$placed" -eq 0 ]; then
              dir="groups/part$group_count"
              mkdir -p "$dir"

              cp "$f" "$dir"

              sizes[$group_count]=$fsize
              dirs[$group_count]=$dir
              group_count=$((group_count + 1))
            fi
          done

      # 5. Compress (with safe split)
      - run: |
          set -e

          for dir in groups/part*; do
            [ -d "$dir" ] || continue

            name=$(basename "$dir")

            7z a -mx=7 -ms=on -m0=lzma2:d=256m -v1900m \
              "out/${{ github.event.inputs.OUTPUT_NAME }}-$name.7z" "$dir"/*
          done

      # 6. Release
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}
          name: rom-${{ github.run_id }}
          files: out/${{ github.event.inputs.OUTPUT_NAME }}-part*.7z*
